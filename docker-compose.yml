services:
  minio:
    image: minio/minio:latest
    container_name: popoai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - popoai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build: .
    container_name: popoai-app
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "5000:5000"
    volumes:
      - ./dataset:/app/dataset
      - ./model:/app/model
      - ./uploads:/app/uploads
      - ./annotations:/app/annotations
    networks:
      - popoai-network
    restart: unless-stopped

volumes:
  minio_data:

networks:
  popoai-network:
    driver: bridge
